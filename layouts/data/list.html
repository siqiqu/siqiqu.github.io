{{ define "main" }}
<style>
.timeline {
  position: relative;
  margin-top: 20px;
  padding-left: 30px;
  border-left: 3px solid #d0d0d0;
}

.timeline-item {
  position: relative;
  margin-bottom: 50px;
}

.timeline-item::before {
  content: "";
  position: absolute;
  left: -42px;
  top: 8px;
  width: 12px;
  height: 12px;
  background: #555;
  border-radius: 50%;
  transition: transform 0.2s ease, background 0.2s ease;
}

.timeline-item:hover::before {
  transform: scale(1.6);
  background: #000;
}

.timeline-date {
  font-weight: bold;
  margin-bottom: 6px;
  white-space: nowrap;
}

.timeline-content h3 {
  margin: 5px 0;
}

.timeline-item p {
  margin: 4px 0;
  color: #666;
}
</style>

<h1>{{ .Title }}</h1>

<div class="timeline">
  {{ $pages := sort .Pages "Date" "desc" }}
  {{ range $pages }}
  <div class="timeline-item">
    <div class="timeline-date">
      {{ .Date.Format "Jan 2006" }}
    </div>
    <div class="timeline-content">
      <h3 class="timeline-title">{{ .Title | safeHTML }}</h3>
      {{ with .Params.location }}
        <p>{{ . }}</p>
      {{ end }}
    </div>
  </div>
  {{ end }}
</div>

{{ end }}

{{ end }}
