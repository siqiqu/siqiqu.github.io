{{ define "main" }}

<style>
.timeline {
  position: relative;
  margin-top: 20px;
  padding-left: 50px;
  border-left: 3px solid #d0d0d0;
}

/* 每一个 item */
.timeline-item {
  position: relative;
  margin-bottom: 50px;
}

/* 小点 */
.timeline-item::before {
  content: "";
  position: absolute;
  left: -14px;   /* 精准贴在线上 */
  top: 8px;
  width: 12px;
  height: 12px;
  background: #555;
  border-radius: 50%;
  transition: transform 0.2s ease, background 0.2s ease;
}

/* Hover 时小点变大 */
.timeline-item:hover::before {
  transform: scale(1.6);
  background: #000;
}

/* 时间 */
.timeline-date {
  font-weight: bold;
  margin-bottom: 6px;
  white-space: nowrap;
}

/* 标题 */
.timeline-content h3 {
  margin: 5px 0;
}

/* 位置 */
.timeline-item p {
  margin: 4px 0;
  color: #666;
}
</style>

<h1>{{ .Title }}</h1>

<div class="timeline">

{{ $pages := sort .Pages "Date" "desc" }}

{{ range $pages }}

<div class="timeline-item">

  <div class="timeline-date">
    {{ .Date.Format "Jan 2006" }}
  </div>

 <div class="timeline-content">
  <h3 class="timeline-title">
    {{ .Title | safeHTML }}
  </h3>
</div>

    {{ with .Params.location }}
      <p>{{ . }}</p>
    {{ end }}

  </div>

</div>

{{ end }}

</div>

{{ end }}
